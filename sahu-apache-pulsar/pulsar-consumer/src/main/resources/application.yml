server:
  port: 8081

pulsar:
  broker-url: pulsar://localhost:6650
  topic: persistent://public/default/order-topic
  subscription: order-subscription

spring:
  application:
    name: pulsar-consumer
  datasource:
    url: jdbc:h2:mem:orderdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.poc: DEBUG
    org.apache.pulsar: WARN
